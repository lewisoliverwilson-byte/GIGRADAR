<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GigRadar — Never Miss a Gig</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/main.css" />
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar" id="navbar">
    <div class="nav-inner">
      <a href="#/" class="logo" aria-label="GigRadar Home">
        <span class="logo-icon">📡</span>
        <span class="logo-text">GigRadar</span>
      </a>

      <div class="search-wrap" id="searchWrap">
        <input
          type="text"
          class="search-input"
          id="searchInput"
          placeholder="Search artists, venues, genres…"
          autocomplete="off"
          aria-label="Search"
          aria-autocomplete="list"
          aria-controls="autocompleteDropdown"
        />
        <span class="search-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </span>
        <div class="autocomplete-dropdown" id="autocompleteDropdown" role="listbox" aria-label="Search suggestions"></div>
      </div>

      <div class="nav-links">
        <a href="#/genre/all" class="nav-link" id="navBrowse">Browse</a>
        <a href="#/calendar" class="nav-link" id="navCalendar">Calendar</a>
      </div>

      <div class="nav-actions">
        <button class="bell-btn" id="bellBtn" aria-label="Notifications" aria-expanded="false">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <span class="bell-badge" id="bellBadge">0</span>
        </button>
        <div class="auth-area" id="authArea">
          <button class="btn btn-primary" id="authBtn">Sign In</button>
        </div>
      </div>
    </div>
  </nav>

  <!-- NOTIFICATION PANEL -->
  <div class="notif-overlay" id="notifOverlay" aria-hidden="true"></div>
  <aside class="notif-panel" id="notifPanel" aria-label="Notifications" aria-hidden="true">
    <div class="notif-header">
      <h2>Notifications</h2>
      <button class="notif-close" id="notifClose" aria-label="Close notifications">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="notif-list" id="notifList"></div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main-content" id="mainContent" role="main">
    <div class="loading-screen">
      <div class="spinner"></div>
    </div>
  </main>

  <!-- AUTH MODAL -->
  <div class="modal-backdrop" id="modalBackdrop" aria-hidden="true"></div>
  <div class="modal" id="authModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle" aria-hidden="true">
    <button class="modal-close" id="modalClose" aria-label="Close">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <div class="modal-logo">
      <span>📡</span> GigRadar
    </div>

    <!-- LOGIN FORM -->
    <div id="loginForm">
      <h2 class="modal-title" id="modalTitle">Welcome back</h2>
      <p class="modal-subtitle">Sign in to track gigs from your favourite artists</p>
      <form id="loginFormEl" novalidate>
        <div class="form-group">
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password" />
        </div>
        <p class="form-error" id="loginError"></p>
        <button type="submit" class="btn btn-primary btn-full">Sign In</button>
      </form>
      <p class="modal-switch">Don't have an account? <button class="link-btn" id="switchToSignup">Create one</button></p>
    </div>

    <!-- SIGNUP FORM -->
    <div id="signupForm" style="display:none">
      <h2 class="modal-title">Create account</h2>
      <p class="modal-subtitle">Join thousands of UK gig-goers</p>
      <form id="signupFormEl" novalidate>
        <div class="form-group">
          <label for="signupName">Your name</label>
          <input type="text" id="signupName" placeholder="Alex Smith" autocomplete="name" />
        </div>
        <div class="form-group">
          <label for="signupEmail">Email</label>
          <input type="email" id="signupEmail" placeholder="you@example.com" autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="signupPassword">Password</label>
          <input type="password" id="signupPassword" placeholder="••••••••" autocomplete="new-password" />
        </div>
        <p class="form-error" id="signupError"></p>
        <button type="submit" class="btn btn-primary btn-full">Create Account</button>
      </form>
      <p class="modal-switch">Already have an account? <button class="link-btn" id="switchToLogin">Sign in</button></p>
    </div>

    <!-- VERIFY EMAIL -->
    <div id="verifyForm" style="display:none">
      <div class="verify-icon">✉️</div>
      <h2 class="modal-title">Check your email</h2>
      <p class="modal-subtitle" id="verifySubtitle">We've sent a 6-digit code to your email address.</p>
      <div class="verify-code-preview" id="verifyCodePreview"></div>
      <form id="verifyFormEl" novalidate>
        <div class="form-group">
          <label for="verifyCodeInput">Verification code</label>
          <input type="text" id="verifyCodeInput" placeholder="000000" maxlength="6" autocomplete="one-time-code" inputmode="numeric" />
        </div>
        <p class="form-error" id="verifyError"></p>
        <button type="submit" class="btn btn-primary btn-full">Verify Email</button>
      </form>
      <p class="modal-switch"><button class="link-btn" id="resendCode">Resend code</button> &middot; <button class="link-btn" id="backToSignup">Back</button></p>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast-container" id="toastContainer" aria-live="polite"></div>

  <script src="/js/data.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
