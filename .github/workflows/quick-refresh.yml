name: Quick Refresh (Weekly)

on:
  schedule:
    - cron: '0 3 * * 1'  # Every Monday at 3am UTC
  workflow_dispatch:       # Allow manual trigger from GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION:            us-east-1
      TM_API_KEY:            ${{ secrets.TM_API_KEY }}
      SPOTIFY_CLIENT_ID:     ${{ secrets.SPOTIFY_CLIENT_ID }}
      SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
      LASTFM_API_KEY:        ${{ secrets.LASTFM_API_KEY }}
      SETLISTFM_KEY:         ${{ secrets.SETLISTFM_KEY }}
      RESEND_API_KEY:        ${{ secrets.RESEND_API_KEY }}
      BIT_APP_ID:            gigradar

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm ci
          cd lambda/scraper && npm ci
          cd lambda/api && npm ci

      - name: Run quick refresh
        run: bash scripts/quick-refresh.sh

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quick-refresh-logs-${{ github.run_id }}
          path: scripts/logs/
          retention-days: 7
